# Mobile E2E tests can be run locally with: maestro test .maestro/
# Requires: brew install maestro

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DATABASE_URL: postgresql://todo_user:todo_password@localhost:5432/todo_dev
  DATABASE_URL_TEST: postgresql://todo_user:todo_password@localhost:5433/todo_test
  JWT_SECRET: test-secret

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: todo_user
          POSTGRES_PASSWORD: todo_password
          POSTGRES_DB: todo_dev
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-test:
        image: postgres:17-alpine
        ports:
          - 5433:5432
        env:
          POSTGRES_USER: todo_user
          POSTGRES_PASSWORD: todo_password
          POSTGRES_DB: todo_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @todo-app/api exec prisma generate

      - name: Run Prisma migrations
        run: pnpm db:migrate

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm test:e2e

  # Mobile E2E tests using Maestro
  # To run locally: brew install maestro && maestro test .maestro/
  # Requires a running iOS Simulator or Android Emulator with the app installed,
  # and the API server running with seeded test data.
